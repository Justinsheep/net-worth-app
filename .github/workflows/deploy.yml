name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # 每 30 分鐘重新抓報價並重新部署（GitHub 排程尖峰時可能延遲數分鐘）
    - cron: '*/30 * * * *'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# 同一時間只跑一個部署，新的取代排隊中的
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install

      - name: Fetch stock prices
        run: node scripts/fetch-prices.mjs
        # 抓價失敗（例如 Yahoo 暫時掛掉）不擋部署，就用手動填的價
        continue-on-error: true

      - name: Generate symbol list
        run: node scripts/gen-symbols.mjs
        # 清單抓不到不擋部署，代號欄會退回純手打
        continue-on-error: true

      - name: Build
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
